# Medallion Architecture Configuration
# Databricks Community Edition — Unity Catalog
# Bronze → Silver → Gold layers

catalog: main
schema: default

tables:
  bronze: main.default.bronze_earthquake_events
  silver: main.default.silver_earthquake_events
  gold_daily: main.default.gold_daily_stats
  gold_monthly: main.default.gold_monthly_stats
  gold_regional: main.default.gold_regional_stats
  gold_mag_dist: main.default.gold_mag_distribution
  gold_ml_features: main.default.gold_ml_features

ingestion:
  source_url: "https://earthquake.usgs.gov/fdsnws/event/1/query?format=csv&minmagnitude=2.5&orderby=time"
  format: csv
  batch_id_algorithm: md5_hash
  rate_limit_ms: 100

quality:
  severity_levels: [FAIL, WARN, INFO]
  fail_rules:
    - dq_no_null_id
    - dq_no_null_time
    - dq_valid_latitude
    - dq_valid_longitude
    - dq_valid_magnitude
  warn_rules:
    - dq_no_null_magnitude
    - dq_no_null_depth
    - dq_no_null_place

silver:
  dedup_strategy: window_latest
  dedup_keys: [id]
  dedup_order: updated
  partition_by: [event_year, event_month]
  enrichment:
    - region (bounding_box)
    - mag_category (magnitude_range)
    - depth_class (depth_range)
    - event_year, event_month, event_quarter

gold:
  grains:
    - daily (time-series + rolling windows)
    - monthly (trend + MoM delta)
    - regional (region × month)
    - magnitude_distribution (statistical)
    - ml_features (event-level + lagged features)
  rolling_windows: [7d, 30d, 10_event]
  ml_features:
    - prev_event_mag
    - prev_event_depth
    - time_since_prev_event
    - rolling_10_event_avg_mag
    - rolling_10_event_max_mag
    - rolling_10_event_count
    - mag_95th_percentile_region