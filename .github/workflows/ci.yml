name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyyaml
      - name: Ruff check (notebooks)
        run: ruff check notebooks/ --select=E9,F63,F7,F82 --no-cache || true
      - name: Ruff check (config)
        run: ruff check config/ --no-cache || true
      - name: Check YAML syntax
        run: python -c "import yaml; yaml.safe_load(open('config/config.yaml'))"

  validate-notebooks:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pyyaml
      - name: Validate notebook structure
        run: |
          python -c "
          import os, re
          
          notebooks = [
              'notebooks/01_bronze_ingestion.py',
              'notebooks/02_silver_transform.py',
              'notebooks/03_gold_analytics.py',
          ]
          
          for nb in notebooks:
              assert os.path.exists(nb), f'Missing: {nb}'
              with open(nb) as f:
                  content = f.read()
              assert '# Databricks notebook source' in content, f'{nb}: missing Databricks header'
              assert '# COMMAND ----------' in content, f'{nb}: missing cell delimiter'
              print(f'✅ {nb}: valid structure')
          
          print('All notebooks valid')
          "

  integration:
    needs: validate-notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pyspark pyyaml pandas
      - name: Run integration smoke test
        run: |
          python -c "
          import yaml
          from pyspark.sql import SparkSession
          
          spark = SparkSession.builder \
            .master('local[2]') \
            .appName('integration-test') \
            .getOrCreate()
          
          # Test config loading
          cfg = yaml.safe_load(open('config/config.yaml'))
          assert 'tables' in cfg, 'Config missing tables section'
          assert 'bronze' in cfg['tables'], 'Config missing bronze table'
          assert 'silver' in cfg['tables'], 'Config missing silver table'
          assert 'gold_daily' in cfg['tables'], 'Config missing gold_daily table'
          print('✅ Config validation passed')
          
          # Test schema enforcement with sample data
          from pyspark.sql.types import (
              StructType, StructField, StringType, DoubleType, TimestampType, IntegerType
          )
          
          schema = StructType([
              StructField('time', TimestampType(), True),
              StructField('latitude', DoubleType(), True),
              StructField('longitude', DoubleType(), True),
              StructField('mag', DoubleType(), True),
              StructField('id', StringType(), False),
          ])
          
          df = spark.createDataFrame([
              ('2024-06-01T00:00:00', -8.5, 115.2, 4.5, 'us7000test1'),
              ('2024-06-15T00:00:00', -7.3, 109.8, 3.2, 'us7000test2'),
          ], schema=schema)
          
          assert df.count() == 2
          print(f'✅ Schema enforcement: {df.count()} rows')
          
          # Test quality check function
          null_count = df.filter('mag IS NULL').count()
          assert null_count == 0
          print('✅ Quality checks: no nulls in mag')
          
          print('\\n✅ Integration test PASSED')
          spark.stop()
          "